<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWA Learn</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SWA Learn">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f7f6f3;display:flex;align-items:center;
  justify-content:center;min-height:100vh;}
.splash{text-align:center;padding:2rem}
.logo{font-size:72px;margin-bottom:1rem;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.name{font-size:28px;font-weight:700;color:#1a1a18;letter-spacing:-.03em}
.name span{color:#1D9E75}
.sub{font-size:14px;color:#6b6b63;margin-top:8px}
.spinner{width:32px;height:32px;border:3px solid #E1F5EE;
  border-top-color:#1D9E75;border-radius:50%;
  animation:spin .8s linear infinite;margin:2rem auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">🌍</div>
  <div class="name">SWA <span>Learn</span></div>
  <div class="sub">Loading your progress...</div>
  <div class="spinner"></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCpW2epwNkTiZjZ1AJPVWY2dEHsJLqdXYU",
  authDomain: "swa-learn-6625a.firebaseapp.com",
  projectId: "swa-learn-6625a",
  storageBucket: "swa-learn-6625a.firebasestorage.app",
  messagingSenderId: "755955864193",
  appId: "1:755955864193:web:05bbcd9c3a8daa130c7380"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
auth.onAuthStateChanged(user => {
  if(user) window.location.replace("dashboard.html");
  else window.location.replace("login.html");
});
setTimeout(() => window.location.replace("login.html"), 5000);
</script>
</body>
</html>
